# Optional — only needed if you want to supply your own certificate.
# If not mounted, the container auto-generates a self-signed cert.
#
# To create from existing files:
#   kubectl create secret tls git-proxy-tls \
#     --cert=tls.crt --key=tls.key \
#     -n git-proxy
#
# To use cert-manager, add this annotation to the Service or Ingress:
#   cert-manager.io/cluster-issuer: letsencrypt-prod
apiVersion: v1
kind: Secret
metadata:
  name: git-proxy-tls
  namespace: git-proxy
type: kubernetes.io/tls
data:
  tls.crt: <base64-encoded-cert>
  tls.key: <base64-encoded-key>
