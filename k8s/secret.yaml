apiVersion: v1
kind: Secret
metadata:
  name: git-proxy-repos
  namespace: git-proxy
type: Opaque
stringData:
  # One repo per line: <AZURE_DEVOPS_URL> <PAT>
  # PAT needs Code → Read & Write
  repos.conf: |
    # https://dev.azure.com/myorg/myproject/_git/repo1 pat1here
    # https://dev.azure.com/myorg/myproject/_git/repo2 pat2here
