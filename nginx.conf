user nginx;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # Needed for large pack files on push
    client_max_body_size 0;

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location = /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Git Smart HTTP — handles clone, fetch, push
        location ~ "^(/[^/]+\.git)/(HEAD|info/refs|objects/info/[^/]+|objects/[0-9a-f]{2}/[0-9a-f]{38}|objects/pack/pack-[0-9a-f]{40}\.(pack|idx)|git-upload-pack|git-receive-pack)$" {
            fastcgi_pass unix:/var/run/fcgiwrap.sock;

            fastcgi_param SCRIPT_FILENAME    /usr/lib/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT   /repos;
            fastcgi_param PATH_INFO          $1/$2;

            # Enable push (receive-pack) via HTTP
            fastcgi_param GIT_HTTP_RECEIVE_PACK true;

            # Forward the Git-Protocol header so clients get v2 responses
            # nginx lowercases headers and prefixes with http_
            fastcgi_param GIT_PROTOCOL       $http_git_protocol;

            fastcgi_read_timeout 600;
            fastcgi_send_timeout 600;

            include fastcgi_params;
        }

        location / {
            return 404 "not found\n";
        }
    }
}
